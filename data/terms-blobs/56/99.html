<p> </p>
<p><b>This Privacy Policy is effective and was last updated December 17, 2025.</b></p>
<p> </p>
<p><b><u>Introduction</u></b></p>
<p> </p>
<p>Welcome! Your privacy is important to Kia America, Inc. (herein referred to as “<b>Kia</b>” or “<b>we</b>,” “<b>our</b>” or “<b>us</b>”) and its affiliate companies. This privacy policy (“<b>Privacy Policy</b>”) describes how we collect, use, and disclose information when you use the websites and online services that we own, operate, or make available and that link to or reference this Privacy Policy (e.g., websites such as Kia.com, owners.kia.com, and kiamedia.com and certain of our mobile websites, mobile applications, downloads, and interactive features) (collectively, the “<b>Site</b>”). The Privacy Policy also describes how we use and disclose information collected by us “offline” (including, but not limited to, by postal mail, contest submissions, loyalty programs, telephone requests, surveys, or auto shows). In the Privacy Policy, we refer to our online and offline activities collectively as the &quot;<b>Services</b>.&quot; This Privacy Policy does not apply to information collected using in-vehicle technologies and related services, including online and mobile services that connect to or collect information from your Kia vehicle; a different privacy policy may apply to such collection, such as the privacy policy for Kia Connect Services, available at <a href="https://owners.kia.com/us/en/privacy-policy.html" target="_blank" style="background-color: rgb(255,255,255);" v-open-concent="true">https://owners.kia.com/us/en/privacy-policy.html</a>.</p>
<p> </p>
<p>To the extent we provide you notice on our Services of different or additional privacy policies or practices (e.g., at the point of our collection), those additional terms shall govern such data collection and use.</p>
<p> </p>
<p>In addition, please review the Services’ <a href="/us/en/terms-of-service" target="_blank" v-open-concent="true">Terms of Service</a>, which governs your use of the Services. <i>By using our Services, you consent to the processing of your information in accordance with our Privacy Policy, and agree to the Terms of Service, and the terms of service applicable to specific Kia products or services you choose to use.</i></p>
<p> </p>
<p>The Site and information on it is intended for use and access by U.S. residents only. Kia does not knowingly collect, process, access, or intend to access the Personal Information of persons residing outside of the U.S., including in Europe and China. If you do not reside in the U.S., you should stop accessing the Site. Instead, you should visit the Kia-affiliated website that is applicable to your country or region. If you are located in the European Economic Area (“EEA”), please visit <a href="https://www.kia.com/eu" target="_blank" style="background-color: rgb(255,255,255);" v-open-concent="true">https://www.kia.com/eu</a>. </p>

        <p><b>1. Who We Are</b></p>
<p> </p>
<p>Kia is a United States based subsidiary of Kia Corporation, which is based in Seoul, South Korea. We are the exclusive distributor of Kia-branded vehicles, parts, and accessories in the United States. Our “dealers” and “licensees” are independent companies that sell our vehicles, parts, and accessories, and are licensed to operate such businesses using the trade names, trademarks, and service marks owned by us or our affiliates. Our “business partners” are independent companies that we contract with to provide you with or offer you other services and products. In this Privacy Policy, we refer to dealers, licensees, and business partners collectively as “<b>Partners</b>.” This Privacy Policy governs only Kia’s privacy practices. It does not govern the privacy practices of our Partners, even when you connect to their websites from the Services and when their websites or communications are co-branded with Kia trademarks. To learn about the privacy practices of our Partners, please review the privacy policies of each of those Partners. However, if a Partner discloses information to us (including when you purchase or service a Kia vehicle with a dealer), this Privacy Policy will apply to our collection and use of such disclosed information.</p>
<p> </p>
<p>Our “<b>Affiliates</b>” include our parent company(ies), subsidiaries, sister companies, and affiliated companies. As described below, we may disclose information that we collect to our Affiliates. Our Affiliates may have their own privacy policies that govern their treatment of information that you provide to them directly or that they collect when you use their websites, applications, or other services. For example, Kia customers who have financed or leased a Kia vehicle through Kia Finance America will be subject to Kia Finance America’s own privacy policy (and terms of use) with respect to the information collected via Kia Finance America’s websites, applications, and other services.</p>

        <p><b>2. What Information Do We Collect and How Do We Use It?</b></p>
<p> </p>
<p>In the course of our business, we collect information that identifies, relates to, describes, is capable of being associated with, or could reasonably be linked, directly or indirectly, with a particular consumer or household (“Personal Information”). Although our processing of Personal Information varies based upon our relationship and interactions with you and depends on what Services you have used, the table below identifies, generally, the categories of Personal Information we may have collected from you in the last twelve (12) months, which we may have also shared with our service providers for certain business purposes, or sold or otherwise disclosed to third parties for the purposes outlined in this Privacy Policy. We also would note that we collect different information about our employees than we do about vehicle owners and other non-employees, and the types of third parties that we disclose such information with greatly varies. While we may need to disclose employee social security numbers with benefits providers, for instance, we do not collect or disclose social security numbers of vehicle purchasers, unless you have been specifically notified that we need to collect and disclose that information.</p>
<p> </p>
<p>The categories below are those identified in the California Consumer Privacy Act (“CCPA”), as amended by the California Privacy Rights Act (“CPRA”) (Civil Code Section 1798.100, et seq.) (collectively “California Law”).<br />
</p>
<p style="text-align: left;"> </p>
<table border="1" cellspacing="0" cellpadding="0">
<tbody><tr><td width="132" valign="top"><p style="text-align: left;"><b>Category</b></p>
</td>
<td width="390" valign="top"><p style="text-align: left;"><b>Examples</b></p>
</td>
<td width="84" valign="top"><p style="text-align: left;"><b>Collected? </b></p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Identifiers.</p>
</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: name, postal address, unique personal identifiers, online identifiers, email address, account name, Social Security number, driver’s license number, license plate number, vehicle identification number (“VIN”), passport number, or other similar identifiers. Under California Law, “unique identifiers” or “unique personal identifier” means a persistent identifier that can be used to recognize a consumer, a family, or a device that is linked to a consumer or family, over time and across different services, including, but not limited to, a device identifier; an Internet Protocol address; cookies, beacons, pixel tags, mobile ad identifiers, or similar technology; customer number, unique pseudonym, or user alias; telephone numbers; or other forms of persistent or probabilistic identifiers that can be used to identify a particular consumer or device.</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Personal information categories listed in the California Customer Records statute (Cal. Civ. Code § 1798.80(e)).</p>
</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: name, signature, Social Security number, physical characteristics, address, telephone number, passport number, driver’s license or state identification card number, insurance policy number, education or employment information, financial account numbers, medical information, or health insurance information.</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Protected classification characteristics under California or federal law.</p>
</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: age, race, color, ancestry, national origin, citizenship, religion or creed, marital status, medical condition, physical or mental disability, sex and gender information, veteran or military status, or genetic information.</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Commercial information.</p>
</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: records of personal property, products or services purchased, obtained, or considered, or other purchasing or consuming histories or tendencies.<br />
</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Biometric information.</p>
</td>
<td><p>This category may include: imagery of the iris, retina, fingerprint, face, hand, palm, vein patterns, and voice recordings, from which an identifier template, such as a face print, a minutiae template, or a voiceprint, can be extracted.</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">NO</p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Internet or other electronic network activity information.</p>
</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: browsing history, search history, and information regarding interactions with an Internet Web site, application, or advertisement.</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Geolocation data.</p>
</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: physical location or movements.</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>
</td>
</tr><tr><td width="132" valign="top"><p style="text-align: left;">Sensitive Personal Information.</p>
</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include Social Security number, driver’s license, state identification card, or passport number; account log-in, financial account, debit card, or credit card number in combination with any required security or access code, password, or credentials allowing access to an account; precise geolocation; racial or ethnic origin, religious or philosophical beliefs; union membership; genetic data; unique biometric information; citizenship or immigration status; contents of certain mail, emails, and text messages; or health, sex life or sexual orientation information.</p>

<td width="390" valign="top"><p style="text-align: left;">This category may include: audio, electronic, visual, thermal, olfactory, or similar information.</p>

<td width="390" valign="top"><p style="text-align: left;">This category may include: current or past job history or performance evaluations.</p>

</td>

</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: education records directly related to a student maintained by an educational institution or party acting on its behalf (e.g., grades, transcripts, schedules, and student ID numbers).<br />
</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>

</td>
<td width="390" valign="top"><p style="text-align: left;">This category may include: inferences drawn from the above information that may reflect your preferences, characteristics, predispositions, behavior, attitudes, or similar behavioral information.</p>
</td>
<td width="84" valign="top"><p style="text-align: left;">YES</p>
</td>
</tr></tbody></table>
<p><i> </i></p>
<p><i>Note: Additional information may be collected by and stored in your vehicle, depending on what in-vehicle features you choose to use and engage. This Privacy Policy only covers information that is collected by, transmitted to, or otherwise processed by us in connection with the Services, and excludes information that is solely collected and stored in your vehicle and remains inaccessible to Kia.</i></p>
<p> </p>
<p>The below sections describe how we collect information from different types of consumers that we interact with, our purposes for collection and how we may disclose and use the information. As described below, data collection and usage greatly varies depending on how you may choose to interact with us and use our products and services.</p>

  <text-with-auto-scroll :element-id="'what-information-visitors'"></text-with-auto-scroll>
  <div id="what-information-visitors">
    
<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p style="margin-left: 40.0px;"><b>(a) Kia Site Visitors</b></p>
<p> </p>
<p><b>Information Collected Directly From You.</b> If you visit our Site, we and our third-party service providers may collect information that you provide to us when you use our Site. The information that we collect and how we process it depends on how you use the Site. We may collect information when you browse through the Site, register or create an account, make an information request, participate in promotional activities such as surveys, or when you otherwise interact with us and provide your information via our Site.<br />
</p>
<p> </p>
<p><b>Information We Collect From Other Sources.<i> </i></b>We and our third-party service providers such as analytics partners, advertising networks and social networks may use technologies that automatically (or passively) collect certain information when a user engages online with the Services (“Usage Information”). Some Usage Information may be considered Personal Information, such as if and when it is linked to any information that reasonably identifies you. This Usage Information may be stored or accessed using a variety of technologies that may be downloaded to your personal computer, browser, laptop, tablet, mobile phone or other device (a “Device”) whenever you visit or interact with our Services. Usage Information may include, but is not limited to, the following information:</p>
<p> </p>
<ul>
<li>Device functionality (including browser, operating system, hardware, mobile network information);</li>
<li>The type of Device used to access the Services;</li>
<li>The content viewed immediately before and after a Device accesses the Services;</li>
<li>The online service, if any, that referred the Device to our Services;</li>
<li>The areas of our Services that the Device visits and the user’s activities there, including remembering the user and his/her preferences;</li>
<li>The time and duration of the Device’s engagement with the Services;</li>
<li><span>The user’s IP address, UDID and other unique identifiers (“<span style="font-weight: bold;">Device Identifier</span>”). A Device Identifier is a number that is automatically assigned to a Device used to access the Services, and our computers identify the Device by its Device Identifier;</span></li>
<li>How often the Device visits the online Services; and</li>
<li>Device location (as discussed more fully below).</li>
</ul>
<p> </p>
<p>Although Usage Information may not identify you or be associated with you, if we associate Usage Information with Personal Information about you, we will treat the combined information as Personal Information.<br />
</p>
<p> </p>
<p><b><i>Information We Collect Through Automatic Data Collection Technologies. </i></b>As a user navigates through and interacts with our Site, we and third parties such as analytics partners, advertising networks and social networks may use automatic data collection technology to collect certain Usage Information, which may include, without limitation, the following technologies and information:</p>
<p> </p>
<ul>
<li><span><span style="font-weight: bold;">Cookies.</span> A cookie is a data file placed on a Device when a user accesses the Services.</span></li>
</ul>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">o Session cookies: Session cookies are temporary bits of information that are erased once you exit your web browser window or otherwise turn off your computer. Session cookies are used, for example, to improve navigation on our Sites, to block visitors from providing information where inappropriate (e.g., the website may remember previous entries of age that are outside the permitted parameters and block subsequent changes), and to collect aggregated statistical information.</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">o Persistent cookies: Persistent cookies are more permanent bits of information that are placed on the hard drive of your computer and stay there unless you delete the cookie. Persistent cookies store information on your computer for a number of purposes, such as retrieving certain information you have previously provided (e.g., Login ID), helping to determine what areas of the website visitors find most valuable, and customizing the website based on your preferences on an ongoing basis.</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">o You may manage your cookie preferences via the “Cookie Management” <a v-open-concent="true" href="#">link</a> available in the footer of our website, if applicable.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<ul>
<li><span><span style="font-weight: bold;">Pixel Tags. </span>Small graphic images or other web programming code called “pixel tags” (also known as “web beacons,” “tracking beacons,” “1x1 GIFs,” or “clear GIFs”) may be included in our web and mobile pages and messages. Pixel tags may be invisible to you, but any electronic image or other web programming code inserted into a web or mobile page or e-mail can act as a pixel tag. Pixel tags or similar technologies may be used for a number of purposes, including, without limitation, to count users of the Services, to learn how users interact with the Services, to let us know whether you viewed our emails or other electronic communications, and to learn whether our ads are effective.</span></li>
<li><span><span style="font-weight: bold;">Embedded Scripts.</span> An embedded script is code that helps us collect information about a user’s interactions with the Services, such as the links clicked by a user.</span></li>
<li><span><span style="font-weight: bold;">Browser Fingerprinting.</span> Collection and analysis of information from a Device, such as, without limitation, operating system, plug-ins, system fonts and other data, for purposes of identification.</span></li>
<li><span><span style="font-weight: bold;">Recognition Technologies. </span>Technologies, including application of statistical probability to data sets, which attempt to recognize or make assumptions about users and devices (e.g., that a user of multiple devices is the same individual).</span></li>
<li><span><span style="font-weight: bold;">Precise Location Information. </span>Our mobile applications and websites may collect precise information about the location of a Device after the user permits us to obtain such information via GPS, Wi-Fi signals, or cell tower signals. To opt out of the collection of location information from your Device, you can adjust the permissions on your Device or uninstall our mobile applications. We collect precise location information to provide you with information that you request, such as the location of a nearby dealer. We may also use and share precise location for any of the purposes described in the “How Do We Use the Information?” and “Why We May Disclose Information With Third Parties.” sections of this Privacy Policy. We will not, however, disclose your precise location information with unaffiliated third parties for their own use without your consent.</span></li>
</ul>
<p> </p>
<p><b>How Do We Use The Information? </b>We may use the information we collect in order to:</p>
<p> </p>
<ul>
<li>Provide you with information or services that you have requested or agreed to receive such as requests for product information, new vehicle information alerts, and brochures;</li>
<li>Process transactions;</li>
<li>Send you special offers or promotional materials on behalf of us or third parties;</li>
<li>Enable you to participate in features of the Services, such as sweepstakes, contests, and other promotions;</li>
<li>Process your registration with the Services, including verifying your information is accurate and up to date;</li>
<li>Maintain, operate, and improve the Services and our vehicles, products, and other offerings, including delivering software updates;</li>
<li>Develop new vehicles, products, and services;</li>
<li>Analyze the effectiveness of our advertising;</li>
<li>Contact you about your use of the Services and to inform you, in our discretion, of changes to the Services or our policies;</li>
<li>Advise you of important safety-related information;</li>
<li>Customize and personalize your experiences with the Services;</li>
<li>Understand you and your preferences to enhance and personalize your experience;</li>
<li>Deliver advertising or marketing communications based on your interests, location, or online activity, and to monitor the effectiveness of our advertising;</li>
<li>Detect and prevent fraudulent, unlawful, unauthorized, or abusive use of the Services;</li>
<li>Conduct internal research;</li>
<li>Support our internal business operations; </li>
<li>Process information as disclosed at the time we collect the information or as otherwise set forth in this Privacy Policy or in any other document made available to you; and</li>
<li>Process information as described when you provide the information.</li>
</ul>
<p> </p>
<p><b>Why We May Disclose Information With Third Parties. </b>We may disclose your information to third parties including our Affiliates and our Partners and their service providers. We may also disclose information to our marketing and promotional service providers, including advertising and social networks, that assist with marketing campaigns and other outreach efforts aimed at current or prospective Kia vehicle owners, or our data analytic, data enhancement, and market research providers that assist in keeping our contact information up to date and understanding our audiences.<br />
<br />
We may also disclose your information to satisfy any applicable law, regulation, subpoenas, court orders, warrants, governmental requests, or legal process if in our good faith opinion such is required or permitted by law. In addition, we may disclose your information to a third party performing audit, legal, operational, or other similar services for or on Kia’s behalf. Moreover, we reserve the right to disclose and transfer the information we collect: (i) to a subsequent owner, co-owner, or operator of the Services or associated databases; or (ii) in connection with the negotiation, planning, or completion of a corporate merger, consolidation, restructure, sale of substantially all of our shares or assets, or other corporate change.<b><br />
 </b></p>
      
    </template>
  </foundation-component-rte>
  
</div>

        <p style="margin-left: 40.0px;"><b>(b) Kia Vehicle Owners</b></p>
<p> </p>
<p><b>Information Collected Directly From You.</b> If you are a Kia vehicle owner, we may collect information that you provide when you purchase, lease, repair, or contact us regarding a Kia vehicle, when you register or create an account on the Kia owner’s portal (known as a <b>“KOP Account”</b>), or when you otherwise interact with us or our service providers. We may also collect information from you when you navigate our Site (from cookies and other digital technologies, as described above). If you use in-vehicle technologies and related services, including online and mobile services that connect to or collect information from your Kia vehicle, please also see the privacy policy for Kia Connect Services at <a href="https://owners.kia.com/us/en/privacy-policy.html" target="_blank" v-open-concent="true">https://owners.kia.com/us/en/privacy-policy.html.</a></p>
<p> </p>
<p><b>Information We Collect From Other Sources.</b> We may also collect information about you from our Affiliates and our Partners and their service providers, such as when you purchase, lease, or repair a Kia vehicle at a Kia dealership. We may also collect information about you from or through advertising and social networks, and our service providers, including data analytics, data enhancement, and market research providers that assist in keeping our ownership records and owner contact information up to date and understanding our audiences.</p>
<p> </p>
<p><b>How Do We Use The Information? </b>We may use the information we collect in order to:</p>
<p> </p>
<ul>
<li>Process transactions;</li>
<li>Provide you with information or services that you have requested or agreed to receive such as roadside assistance, vehicle maintenance, requests for product information, new vehicle information alerts, and brochures;</li>
<li>Enable you to participate in and to administer features of the Services, such as sweepstakes, contests, and other promotions, including fulfillment of loyalty or rewards programs;</li>
<li>Process your registration with Services and verify that your information is accurate and up to date;</li>
<li>Develop, operate, and improve our vehicles, products, and other offerings;</li>
<li>Conduct internal research;</li>
<li>Customize and personalize your experiences with the Services;</li>
<li>Deliver advertising or marketing communications based on your interests, location, or online activity, and monitor the effectiveness of our advertising;</li>
<li>Administer and verify warranties;</li>
<li>Advise you of important safety-related information, such as recalls;</li>
<li>Learn more about our customers and their experiences and to monitor your satisfaction with Kia products and services provided to you;</li>
<li>Detect and prevent fraudulent, unlawful, unauthorized, or abusive use of the Services;</li>
<li>Support our internal business operations; and</li>
<li>Process information as disclosed at the time we collect the information or as otherwise set forth in this Privacy Policy or in any other document made available to you.</li>
</ul>
<p> </p>
<p><b>Why We May Disclose Information With Third Parties.</b> We may disclose your information to third parties including our Affiliates and Partners and their service providers, who may provide offers or services to you, including the fulfillment of our loyalty or rewards programs. We may also disclose information to advertising and social networks, our marketing and promotional service providers that assist with marketing campaigns and other outreach efforts aimed at Kia vehicle owners, or our data analytic, data enhancement, and market research providers that assist in keeping our contact information up to date and understanding our audiences.</p>
<p><br />
We may also disclose your information to satisfy any applicable law, regulation, subpoenas, court orders, warrants, governmental requests, or legal process if in our good faith opinion such is required or permitted by law. In addition, we may disclose your information to a third party performing audit, legal, operational, or other similar services for or on Kia’s behalf. Moreover, we reserve the right to disclose and transfer the information we collect: (i) to a subsequent owner, co-owner, or operator of the Services or associated databases; or (ii) in connection with the negotiation, planning, or completion of a corporate merger, consolidation, restructure, sale of substantially all of our shares or assets, or other corporate change.<br />
<br />
</p>

      
    </template>
  </foundation-component-rte>

        <p style="margin-left: 40.0px;"><b>(c) Prospective Kia Owners</b></p>
<p> </p>
<p><b>Information Collected Directly From You. </b>If you are a prospective Kia owner, such as a person who has requested information about Kia vehicles from the Site or at an event, we may collect information that you provide to us when you request further information on Kia products and services, visit our Site (from cookies and other digital technologies, as described above), participate in promotional activities, or when you otherwise interact with us or our service providers and provide your information.</p>
<p> </p>
<p><b>Information We Collect From Other Sources. </b>We may also collect information about you from our Affiliates, our Partners and their service providers, consumer data resellers, advertising and social networks, and our service providers, including marketing and promotional service, data analytics, data enhancement, and market research providers that assist in keeping our contact information up to date, understanding our audiences, and reaching out to prospective owners. </p>
<p> </p>
<p><b>How Do We Use The Information Collected? </b>We may use the information we collect in order to:</p>
<p> </p>
<ul>
<li>Provide you with information or services that you have requested or agreed to receive, such as requests for product information, new vehicle information alerts, and brochures;</li>
<li>Fulfill or meet the reason you provided the information;</li>
<li>Enable you to participate and take advantage of our products and services, such as sweepstakes, contests, and other promotions;</li>
<li>Customize and personalize your experience with our products, promotions, and offerings;</li>
<li>Deliver advertising or marketing communications (such as special offers and promotional materials) based on your interests, location, or your online activity on our Site, and monitor the effectiveness of our advertising;</li>
<li>Learn more about our prospective customers and their experiences and monitor your satisfaction with Kia products and services you may have considered;</li>
<li>Support our internal business operations; and</li>
<li>Process information as disclosed at the time we collect the information or as otherwise set forth in this Privacy Policy or in other documents made available to you.</li>
</ul>
<p> </p>
<p><b>Why We May Disclose Information With Third Parties.</b> We may disclose your information to third parties including our Affiliates and Partners and their service providers. We may also disclose information to advertising and social networks, our marketing and promotional service providers that assist with marketing campaigns and other outreach efforts aimed at prospective Kia vehicle owners, or our data analytic, data enhancement, and market research providers that assist in keeping our contact information up to date, understanding our audiences, and reaching prospective owners.</p>

      
    </template>
  </foundation-component-rte>

        <p style="margin-left: 40.0px;"><b>(d) On-Premise Visitors</b></p>
<p> </p>
<p><b>Information Collected Directly From You.</b> If you are an on-premise visitor to one of our locations, such as when you visit our headquarters, we collect information that you provide to us during your visit.</p>
<p> </p>
<p><b>Information We Collect From Other Sources.</b> We may also collect information about you and/or your vehicle from our service providers that assist in the registration and logging of on-premise visitors and manage information collected from on-premise visitors, as well as from our on-site electric vehicle charging provider, who facilitates the registration and program management processes.</p>
<p> </p>
<p><b>How Do We Use The Information Collected? </b>We may use the information we collect in order to:</p>
<p> </p>
<ul>
<li>Provide you with information or services that you have requested or agreed to receive as part of your on-premise visit such as requests for information about our Services or the use of on-premise wireless internet service;</li>
<li>Monitor on-premise visitors for security and safety purposes at our locations;</li>
<li>Provide you with the ability to use our on-site electric vehicle charging stations, and contact you in the event your vehicle needs to be removed from one;</li>
<li>Learn more about our on-premise visitors and their experiences and monitor your satisfaction with your visit;</li>
<li>Support our internal business operations; and</li>
<li>Process information as disclosed at the time we collect the information or as otherwise set forth in this Privacy Policy or in other documents made available to you.</li>
</ul>
<p> </p>
<p><b>Why We May Disclose Information With Third Parties.</b> We may disclose your information to third parties in order to satisfy any applicable law, regulation, subpoenas, court orders, warrants, governmental requests, or legal process if in our good faith opinion such disclosure is required or permitted by law. We may also disclose your information to a third party performing audit, legal, operational, or other similar services for or on Kia’s behalf. Moreover, we reserve the right to disclose and transfer the information we collect: (i) to a subsequent owner, co-owner, or operator of the Services or associated databases; or (ii) in connection with the negotiation, planning, or completion of a corporate merger, consolidation, restructure, sale of substantially all of our shares or assets, or other corporate change.</p>

      
    </template>
  </foundation-component-rte>

<div class="cmp-text">
  <foundation-component-rte v-cloak>

        <p style="margin-left: 40.0px;"><b>(e) Kia Employees</b></p>
<p> </p>
<p><b>Information Collected Directly From You. </b>If you are a Kia employee, we collect information that you provide to us when you complete your employment paperwork, participate in employee training, enroll in employee benefits, complete internal company surveys, or when you otherwise interact with us and provide information in the context of your employment.</p>
<p> </p>
<p><b>Information We Collect From Other Sources.</b> We may collect information about you and/or your vehicle from our service providers with whom you provide or update your Personal Information, such as for employee benefits; from your medical providers, such as when you authorize medical providers to send us information about you; from our on-site electric vehicle charging provider, who facilitates the registration and program management processes; and from our Affiliates, including our IT managed service provider, who provides information about employee work practices. If you drive a company-owned vehicle as part of your day-to-day activities as a Kia employee, we may collect geolocation information in relation to your use of that assigned vehicle.</p>
<p> </p>
<p><b>How Do We Use The Information? </b>We may use the information we collect, in order to:</p>
<p> </p>
<ul>
<li>Establish and manage your employment relationship with Kia;</li>
<li>Administer pay and benefits, and maintain employee HR records;</li>
<li>Provide training, education, and other employee engagement opportunities;</li>
<li>Maintain internal record keeping and oversight of Kia personnel, their work activities and their performance;</li>
<li>Maintain emergency contact and beneficiary details;</li>
<li>Comply with applicable laws and various legal retention obligations;</li>
<li>Allow for cooperation with any lawful investigation about past, present, or potential employees;</li>
<li>Conduct internal research;</li>
<li>Provide you with the ability to use our on-site electric vehicle charging stations, and contact you in the event your vehicle needs to be removed from one;</li>
<li>Support our internal business operations; and</li>
<li>Process information as disclosed at the time we collect the information or as otherwise set forth in the Privacy Policy or in other documents made available to you.</li>
</ul>
<p> </p>
<p><b>Why We May Disclose Information With Third Parties.</b> We may disclose your information to Affiliates, as well as vendors and service providers to assist us with establishing and managing the employment relationship, including: payroll and benefits providers and consultants, occupational health providers, insurers, retirement plan administrators, background check service providers, emergency service vendors, training and education vendors, employee engagement vendors, employee travel vendors, employee relocation vendors, business continuity vendors, unemployment services, administrative support vendors, and community service vendors.</p>
<p><br />
We may also disclose your information to satisfy any applicable law, regulation, subpoenas, court orders, warrants, governmental requests, or legal process if in our good faith opinion such is required or permitted by law. In addition, we may disclose your information to a third party performing audit, legal, operational, or other similar services for or on Kia’s behalf. Moreover, we reserve the right to disclose and transfer the information we collect: (i) to a subsequent owner, co-owner, or operator of the Services or associated databases; or (ii) in connection with the negotiation, planning, or completion of a corporate merger, consolidation, restructure, sale of substantially all of our shares or assets, or other corporate change.<br />
</p>

        <p><b>3. Information About Targeted Advertising and Do Not Track Disclosures</b></p>
<p> </p>
<p>We contract with third-party advertising networks, social networks, publishers, and other entities to advertise our products and services on websites not affiliated with us. Some of these third parties may use cookies or other technologies to collect information about your online activities over time and across third-party websites or online services in order to deliver advertising based on your interests and preferences, as inferred from your browsing histories. This type of targeted advertising is sometimes called “online behavioral advertising” or “targeted advertising.” We follow the <a href="https://youradchoices.com/" target="_blank">industry privacy standards</a> for this type of online advertising. When you see one of our ads on another website that is generated and delivered as part of an online behavioral advertising campaign, you should see a small symbol (also called an icon) attached to the targeted ad that you can click on to learn about why and how you are receiving that particular ad.</p>
<p><br />
We and third-party vendors, including Google, use cookies (such as the Google Analytics and Doubleclick cookies) together to report how your ad impressions, other uses of ad services, and interactions with these ad impressions and ad services are related to visits to our Services. Google’s use of the DoubleClick cookie enables Google and its partners to serve ads based on users’ visits to our Services and/or other sites and online services. To learn more about how to opt out of Google’s use of cookies, click <a href="https://tools.google.com/dlpage/gaoptout" target="_blank">here</a>, and otherwise review Google’s privacy policy.</p>
<p><br />
We may use third-party advertising companies to target advertisements to you on our Services, across the web, on your mobile Device, and on any of your other Devices, based on the information we have collected from and about you, as well as information relating to your and other users’ visits to this and other websites and online services. To do so, these companies may place or recognize a unique cookie on your browser (including through the use of pixel tags) or recognize an identifier associated with your mobile Device. These companies may also use these technologies, along with Personal Information they or we collect on the different Devices you use, to recognize you across the Devices you use, such as a mobile device and a laptop or other computer. If you are in the United States and would like more information about cookies and targeted advertisements or to opt out of having this information used by companies that participate in the Self-Regulatory Program for Online Behavioral Advertising on desktop and mobile web browsers, please visit <a href="http://www.aboutads.info/choices" target="_blank">www.aboutads.info/choices</a>. You may download the AppChoices app at <a href="https://youradchoices.com/appchoices" target="_blank">https://youradchoices.com/appchoice</a> to opt out in mobile apps. You may also click on the informational icon contained within each interest-based ad. If eligible, you may exercise your right to opt out of such advertising by following the instructions in Section 14 <b>(“Your California Privacy Rights”)</b> and Section 15 <b>(“Additional State Privacy Rights”)</b> below. Please note that if you opt out of targeted advertising, you may still receive online advertising from Kia and others while you are browsing online. However, the advertisements you see may be less relevant to you and your interests. You should also know that the online behavioral advertising opt-out relies on the use of cookies. If you delete cookies from your Device, buy a new Device, access our Services from a different Device, log in under a different screen name, or change web browsers, you will need to register your opt-out preferences again.</p>
<p><br />
Various third parties are developing or have developed signals or other mechanisms for the expression of consumer choice regarding the collection of information about an individual consumer’s online activities over time and across third-party web sites or online services (e.g., browser do not track signals). Because a “Do Not Track” protocol has not yet been finalized, the information collection and disclosure practices of our websites, and the choices that our websites provide to consumers, will continue to operate as described in this Privacy Policy, whether or not a Do Not Track signal is received. Currently, we do not monitor or take any action with respect to these signals or other mechanisms.</p>

      
    </template>
  </foundation-component-rte>

  <foundation-component-rte v-cloak>

        <p><b>4. What About Information You Share Publicly?</b></p>
<p> </p>
<p>Some features of the Services may permit you to submit or post ideas, photographs, user profiles, writings, music, video, audio recordings, computer graphics, pictures, data, questions, comments, suggestions, or other content, including Personal Information (collectively, “User Content”). We or others may reproduce, publish, distribute, or otherwise use User Content online or offline in any current or future media or format. Others may have access to this User Content and may have the ability to share it with other third parties. Please note that Kia does not control who will have access to the information that you choose to make public, and cannot ensure that parties who have access to such publicly available information will respect your privacy or keep it secure. So, please think carefully before sharing User Content, particularly if it includes Personal Information.</p>

      
    </template>

        <p><b>5. Do the Services Contain Third-Party Content and Links to Third-Party Services?</b></p>
<p> </p>
<p>The Services may contain content that is supplied by third parties, including our Partners. Those third parties may collect information about your use of the Services, and they may be able to track your online activities over time and across various websites. In addition, when you are using the Services, you may be directed to other sites or applications that are operated and controlled by third parties that we do not control. We are not responsible for the privacy practices employed by any of these third parties. For example, if you “click” on a banner advertisement, the “click” may take you away from the Services onto a different website. These other websites may send their own cookies to you, independently collect data, or solicit Personal Information. They may have their own published privacy statements. We encourage you to note when you leave our Services and to read the privacy policies of all third-party websites or applications before submitting any Personal Information to third parties.</p>

<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p><b>6. How Do You Contact Us or Update or Inquire About Your Information and Communications Preferences?</b></p>
<p> </p>
<p>You may be able to review the Personal Information that you provide to us. You are responsible for maintaining the accuracy of the information you submit to us, such as your contact information provided as part of a registration. If you ask us to stop using the Personal Information you have provided to us, we will honor that request while retaining information as necessary to comply with applicable laws.</p>
<p><br />
Eligible California, Colorado, Connecticut, Delaware, Indiana, Iowa, Kentucky, Maryland, Minnesota, Montana, Nebraska, New Hampshire, New Jersey, Oregon, Rhode Island, Tennessee, Texas, Utah, and Virginia consumers have additional rights that allow them to learn about what Personal Information a business has collected, shared, sold and disclosed about them, opportunities to opt out of such sales or sharing, opportunities to request deletion or correction of their Personal Information, opportunities to limit the use and disclosure of their Sensitive Personal Information and protection from discrimination for exercising their rights. Eligible residents of these states may also appeal any decision or indecision related to the exercise of any right provided under applicable law. These rights are more thoroughly discussed below in Section 14 <b>(“Your California Privacy Rights”)</b> and Section 15 <b>(“Additional State Privacy Rights”).</b></p>
<p><br />
<br />
For questions about this Privacy Policy or practices described in it, to inquire about reviewing or correcting your Personal Information, or to update your communication preferences, please call our Kia Customer Care Center at 1-800-333-4542, which is open Monday-Friday from 5 a.m. to 6 p.m. (PST), or write to us directly at: Kia America, Inc., Kia Customer Care Center, P.O. Box 52410, Irvine, CA 92619-2410. We will make good faith efforts to make requested changes in our then active databases as soon as reasonably practicable.</p>

        <p><b>7. Where Does Kia Process the Information?</b></p>
<p> </p>
<p>The Services are operated from the United States and intended for users located in the United States. If you are located anywhere outside of the United States, please be aware that information we collect, including Personal Information, will be transferred to, processed in, and stored in the United States. The data protection laws in the United States may differ from those of the country in which you are located, and your Personal Information may be subject to access requests from governments, courts, or law enforcement in the United States according to laws of the United States. By using the Services or providing us with any information, you consent to this transfer, processing and storage of your information in the United States.</p>

<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p><b>8. What About Information on Children and Minors?</b></p>
<p> </p>
<p>Our Site is not intended for children under thirteen (13) years of age or minors under sixteen (16) years of age. No one under age sixteen (16) may provide any identifying Personal Information to or on the Site. We do not knowingly collect any Personal Information from children or minors younger than sixteen (16) years of age, nor do we knowingly sell or share the Personal Information of children or minors younger than sixteen (16) years of age. If you are under sixteen (16) years of age, do not use or provide any information on this Site or through any of its features, register on the Site, use any of the interactive features of the Site, or provide any information about yourself to us. We will delete any Personal Information collected that we later determine to be from a user younger than the age of sixteen (16). If you are a parent or guardian of a child under the age of sixteen (16) and believe your child has disclosed Personal Information to us, please call our Kia Customer Care Center at 1-800-333-4542.</p>

      
    </template>
  </foundation-component-rte>

        <p><b>9. What About Security?</b></p>
<p> </p>
<p>We incorporate commercially reasonable security procedures and practices to help protect and secure your Personal Information. However, no data transmission over the Internet, wireless transmission, or electronic storage of information can be guaranteed to be 100% secure. Please note that we cannot ensure the security of any information that we collect, and through your use of our Services, you provide us with your information at your own risk. We are not responsible for circumvention of any privacy settings or security measures contained on the Site.</p>

    <template slot="rte-content">
      
        <p><b>10. What About Social Media Features and Widgets?</b></p>
<p> </p>
<p>Some of our websites and mobile applications may include social media plug-ins (such as the Facebook Like button), widgets (such as the “Share” button), or interactive mini-programs that run on our websites or mobile applications. In addition, some of our websites and mobile applications may also permit or require you to register or log into your account via a social networking platform such as Facebook Login.</p>
<p><br />
These social media features and plug-ins may share information about you, in accordance with the terms and conditions (e.g., terms of use and privacy policy) of the company providing those services. In addition, the companies providing these features and plug-ins may be able to collect information about you, including your IP address and your activity on our websites and mobile applications. Social media platforms may notify your connections on their respective platforms about your use of our websites and mobile applications. These social media services may also set cookies to provide their services or use technologies to monitor your online activities over time and across multiple websites and mobile applications for various purposes, including to deliver targeted advertising to you. Your interactions with these plug-in and features are governed by the privacy policy and terms of the company providing them.</p>

<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p><b>11. Data Retention</b></p>
<p> </p>
<p>Kia is committed to only retaining Personal Information for the period of time in which retention is necessary to fulfill a legitimate business purpose and deleting the information thereafter. In certain instances, this may potentially include retaining Personal Information in perpetuity provided we have a legitimate business purpose for doing so. Once we determine there is no longer a legitimate business purpose for retaining the Personal Information, we will delete such information, as determined in our sole discretion and as permitted by law.</p>
<p> </p>
<p>The criteria used to determine our retention period(s) includes:</p>
<p> </p>
<ul>
<li>The length of time we have an ongoing relationship with you and provide the Services to you;</li>
<li>The legitimate business purposes for which we collect and process your Personal Information as described in Section 2 above and throughout this Privacy Policy; and</li>
<li>Whether there is a legal obligation to which we are subject that requires us to keep records before we can delete them. </li>
</ul>

      
    </template>
  </foundation-component-rte>
  
</div>

<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p><b>12. What About Changes to the Privacy Policy?</b></p>
<p> </p>
<p>We reserve the right to change this Privacy Policy from time to time. Any changes will be effective immediately upon the posting of the updated Privacy Policy, or such later date as may be specified in the updated Privacy Policy. Under certain circumstances (for example, in connection with certain material changes), we may also elect to notify you of changes or updates to our Privacy Policy, such as posting a notice on the home page of our website or via a link or tab on the mobile applications. Therefore, you should review this Privacy Policy from time to time, and before using any of our Services. You are responsible for ensuring we have a deliverable email address for you, and for periodically monitoring and reviewing any updates to this Privacy Policy. Your continued use of the Site after such amendments will be deemed your acknowledgement of these changes to the Privacy Policy. <a name="california" id="california"></a></p>

      
    </template>
  </foundation-component-rte>

        <p><b>13. Your Information Choices</b></p>
<p> </p>
<p>You may choose to share your Personal Information with us. However, your participation in using our Site and providing Personal Information is voluntary. You can unsubscribe from and opt out of certain communications and access, or update and delete your contact information, by contacting us at the phone number or address specified below. California, Colorado, Connecticut, Delaware, Indiana, Iowa, Kentucky, Maryland, Minnesota, Montana, Nebraska, New Hampshire, New Jersey, Oregon, Rhode Island, Tennessee, Texas, Utah, and Virginia consumers have additional rights that allow them to learn about what Personal Information a business has collected, shared, sold, and disclosed about them, opportunities to opt out of such sales or sharing, opportunities to request deletion or correction of their Personal Information, and protection from discrimination for exercising their rights. These rights are more thoroughly discussed below in Section 14 <b>(“Your California Privacy Rights”)</b> and Section 15 <b>(“Additional State Privacy Rights”).</b></p>

<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p style="margin-left: 40.0px;"><b>(a) Accessing and Updating Your Information</b></p>
<p> </p>
<p>If you register for a KOP Account on <a href="https://owners.kia.com/content/owners/en/kia-owner-portal.html/" target="_blank" v-open-concent="true">Owners.Kia.com</a>, you can access and update certain information we have relating to your online account by signing into your account and going to the “Account” section of the website. You may also update or delete your contact information by calling (800) 333-4KIA (4542) or by writing us directly at: Kia America, Inc., Kia Customer Care Center, P.O. Box 52410, Irvine, CA 92619-2410.<br />
</p>

      
    </template>
  </foundation-component-rte>

<div class="TextWithAutoScroll aem-GridColumn aem-GridColumn--default--12">

  <text-with-auto-scroll :element-id="'unsubscribe-or-opt-out'"></text-with-auto-scroll>
  <div id="unsubscribe-or-opt-out">
    
<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p style="margin-left: 40.0px;"><b>(b) Unsubscribe or Opt Out</b></p>
<p> </p>
<p>You have the ability to opt out from receiving commercial email, calls, texts, or mail from Kia about our products and services (which is separate and apart from certain states that give the right to opt out of the sale of Personal Information, as more thoroughly described in Sections 14 and 15, and your ability to opt out from advertising and analytics technologies, as discussed in Section 3). If you have a KOP Account, you can access and update communication preferences by signing in and going to the “Account” section of the website. However, we may continue to send communications about active recalls and important announcements regarding your vehicle or account, even if you change your communication preferences.</p>
<p><br />
You may opt out of emails at any time by using the unsubscribe mechanism within the email. The unsubscribe mechanism allows you to manage your subscription preferences for email alerts and special offers. Notwithstanding the above, this mechanism does not automatically opt you out of receiving non-commercial emails, such as registration confirmation, vehicle updates, and responses to direct requests.</p>
<p> </p>
<p>You also may call or write to us directly if you wish to opt out or request that we cease sending you commercial or other information via call, text, mail, or email. Such requests can be made by calling us at (800) 333-4KIA (4542) or by writing us directly at: Kia America, Inc., Kia Customer Care Center, P.O. Box 52410, Irvine, CA 92619-2410.</p>
<p> </p>
<p>At the time information is collected from you, other choices you have about how the information may be used may be explained.<br />
<br />
If you have opted out of receiving future emails or other promotional materials from us, we will implement your opt-out request within a commercially reasonable time.<br />
</p>

      
    </template>
  </foundation-component-rte>
  
</div>

    


  </div>

<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p><b>14. Your California Privacy Rights</b></p>
<p> </p>
<p>California Law provides eligible California residents with specific rights with respect to our collection, retention, and use of Personal Information. This California Privacy Rights section supplements this Privacy Policy and applies solely to eligible residents of California as of January 1, 2023. Any terms not defined in this section have the same meaning as defined in California Law.</p>

      
    </template>
  </foundation-component-rte>
  
</div>

    


  </div>

<div class="TextWithAutoScroll aem-GridColumn aem-GridColumn--default--12">

  <text-with-auto-scroll :element-id="'right-to-know-about-personal-information'"></text-with-auto-scroll>
  <div id="right-to-know-about-personal-information">
    
<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p style="margin-left: 40.0px;text-align: left;"><b>(a) Right to Know About/Access Personal Information Collected, Disclosed, Sold, or Shared</b></p>
<p> </p>
<p>You have the right to request that we provide certain information to you about our collection and use of your Personal Information. Specifically, you have the right to request disclosure of the categories of Personal Information and specific pieces of Personal Information we have collected about you. Upon the submission of a verifiable consumer request (see <b>“Exercising Your California Privacy Rights”</b> below), we will disclose to you:</p>
<p> </p>
<p style="margin-left: 80.0px;">(i) the categories of Personal Information we collected about you;</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(ii) the categories of sources from which Personal Information was collected;</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(iii) the business or commercial purpose for collecting Personal Information;</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(iv) the business or commercial purpose for disclosing, selling or sharing Personal Information; and<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(v) the categories of third parties with whom we sold, shared, or disclosed Personal Information for a business purpose.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p>We will also provide the specific pieces of Personal Information we collected about you, subject to certain exceptions under applicable law, if you request access to such information.</p>
<p> </p>
<p>If you have visited our websites, we may have collected information about you and the Device you used to engage with our websites, such as an IP address, device type, operating system, time of visit, and other similar information, as discussed above. Such information may not be stored with other Personal Information that identifies you (such as your name, postal address, email address, etc.), and we therefore may not be able to reasonably associate this device-level information with you. Thus, we may not be able to provide you with specific information, or delete or correct specific information that we have collected that cannot be reasonably associated with you. You may exercise your privacy rights for device-level data by engaging with the consent management platform displayed when you enter our websites, or by clicking on the “Cookies Management” <a v-open-concent="true" href="#">link</a> in the footer of our websites, if applicable. You may also exercise rights related to advertising and analytics as discussed in Section 3.</p>

      
    </template>
  </foundation-component-rte>
  
</div>

    


  </div>


  

</div>
<div class="TextWithAutoScroll aem-GridColumn aem-GridColumn--default--12">

  <text-with-auto-scroll :element-id="'right-to-request-deletion-of-personal-information'"></text-with-auto-scroll>
  <div id="right-to-request-deletion-of-personal-information">
    
<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p style="margin-left: 40.0px;"><b>(b) Right to Request Deletion of Personal Information</b></p>
<p> </p>
<p>You also have the right to request that we delete Personal Information that we have collected from you, subject to certain exceptions. Once we receive and confirm your verifiable consumer request, we will conduct a reasonable search of our records in order to locate any Personal Information we have collected from you that is eligible for deletion, and delete such Personal Information. To the extent we have disclosed any Personal Information collected about you with service providers or contractors that is eligible for deletion, we will direct those service providers or contractors to delete that Personal Information as well. For the sake of clarity, however, Kia may not be able to comply entirely with your request to delete all of your Personal Information as set forth under California Law. For example, if you purchased, leased, or serviced a Kia vehicle at a Partner’s dealership, we may need to keep records related to these types of transactions in order to, for instance, fulfill the terms of an applicable warranty or contact you about a product recall or other safety issue. Specifically, we are not required to delete any Personal Information we have collected about you that is necessary for us and our service provider(s) to:<br />
</p>
<p> </p>
<p style="margin-left: 80.0px;">(i) Complete the transaction for which the Personal Information was collected, fulfill the terms of a written warranty or product recall conducted in accordance with federal law, provide a good or service requested by you, or reasonably anticipated within the context of our ongoing business relationship with you, or otherwise perform a contract between Kia and you.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(ii) Help ensure security and integrity to the extent the use of the consumer’s Personal Information is reasonably necessary and proportionate for those purposes, including to detect security incidents that compromise the availability, authenticity, integrity, and confidentiality of stored or transmitted Personal Information; protect against malicious, deceptive, fraudulent, or illegal activity and help prosecute those responsible for that activity; or ensure the life and physical safety of natural persons.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(iii) Debug to identify and repair errors that impair existing intended functionality.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(iv) Exercise free speech, ensure the right of another consumer to exercise his or her right of free speech, or exercise another right provided for by law.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(v) Comply with the California Electronic Communications Privacy Act pursuant to Chapter 3.6 (commencing with Section 1546) of Title 12 of Part 2 of the Penal Code.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(vi) Engage in public or peer-reviewed scientific, historical, or statistical research in the public interest that adheres to all other applicable ethics and privacy laws, when our deletion of the information is likely to render impossible or seriously impair the achievement of such research, if you have provided informed consent.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(vii) Enable solely internal uses that are reasonably aligned with your expectations based on your relationship with us.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(viii) Comply with a legal obligation, such as retaining records for a period of time as set out in local, state, or federal laws.<br />
</p>
<p style="margin-left: 80.0px;"> </p>
<p style="margin-left: 80.0px;">(ix) Otherwise use your Personal Information, internally, in a lawful manner that is compatible with the context in which you provided your information.</p>
<p style="margin-left: 80.0px;"> </p>
<p>Following a deletion request, any Personal Information about you that was not deleted from our systems due to the above exception(s) will only be used for the purposes provided for by the applicable exceptions. Thus, all Personal Information about you that is not subject to a deletion exception will either be (1) permanently deleted on our existing systems (with the exception of archived or back-up systems maintained for emergency disaster recovery and business continuity purposes); (2) de-identified; or (3) aggregated so as to not be personal to you.</p>

      
    </template>
  </foundation-component-rte>
  
</div>

    


  </div>


  

</div>
<div class="TextWithAutoScroll aem-GridColumn aem-GridColumn--default--12">

<div class="cmp-text">
  <foundation-component-rte v-cloak>
    <template slot="rte-content">
      
        <p style="margin-left: 40.0px;"><b>(c) Right to Correct Inaccurate Personal Information</b></p>
<p> </p>
<p>You have the right to request that we correct any of your Personal Information that we maintain about you, taking into account the nature of the Personal Information and the purposes of the processing of your Personal Information.</p>

      
    </template>
  </foundation-component-rte>
  
</div>

    


  </div>


  

</div>
